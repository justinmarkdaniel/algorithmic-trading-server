services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: algorithmic-trading-server:local
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_LOG_DIR: /app/logs
      BOT_IP_WHITELIST_DISABLED: "1"   # local dev: open up the API
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
