name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: System deps (TA-Lib)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget build-essential
          cd /tmp
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar xf ta-lib-0.6.4-src.tar.gz && cd ta-lib-0.6.4
          ./configure --prefix=/usr/local
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check server/
      - name: Tests
        env:
          BOT_IP_WHITELIST_DISABLED: "1"
          BOT_DISABLE_TICK: "1"
        run: pytest server/tests/ -v
